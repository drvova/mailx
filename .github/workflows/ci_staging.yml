name: CI Staging

on:
  push:
    branches:
      - staging

permissions:
  contents: read

jobs:
  test_api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 'staging'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        working-directory: api
        run: |
          go test ./... -v
          go vet ./...

  test_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 'staging'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install and build
        working-directory: app
        run: |
          npm install
          npm run build
